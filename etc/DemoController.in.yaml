---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: true
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: false
# Where to look for state libraries
StatesLibraries:
  - "@BWC_STATES_LIBRARIES@"
  - "@MC_STATES_DEFAULT_INSTALL_PREFIX@"
  - "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
# Where to look for state files
StatesFiles:
  - "@BWC_STATES_FILES@"
  - "@MC_STATES_DEFAULT_INSTALL_PREFIX@/data"
  - "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
# If true, state factory will be more verbose
VerboseStateFactory: false
# General constraints, always on
constraints:
  - type: contact
  - type: kinematics
    damper: [ 0.1, 0.01, 0.5 ]
  - type: compoundJoint
# Collision constraint
collisions:
  - type: collision
    useMinimal: true
#  - type: collision
#    r1: rhps1
#    r2: desk
#    useMinimal: true
#    collisions:
#    - body1: L_WRIST_Y_LINK
#      body2: table
#      iDist: 0.1
#      sDist: 0.05
#      damping: 0.0
#    - body1: R_WRIST_Y_LINK
#      body2: table
#      iDist: 0.1
#      sDist: 0.05
#      damping: 0.0

PostureTask:
  stiffness: 10

CoMTask:
  type: com
  stiffness: [ 1000.0, 1000.0, 1000.0 ]
  weight: 1000.0

BaseOrientationTask:
  type: orientation
  stiffness: 300.0
  weight: 500.0

FootTaskList:
  - type: firstOrderImpedance
    foot: Left
    frame: LeftFootCenter
    cutoffPeriod: 0.01
    weight: 1000.0
  - type: firstOrderImpedance
    foot: Right
    frame: RightFootCenter
    cutoffPeriod: 0.01
    weight: 1000.0

FootManager:
  name: FootManager
  footstepDuration: 0.9 # [sec]
  doubleSupportRatio: 0.15 # []
  deltaTransLimit: [ 0.1, 0.08, 7.5 ] # (x [m], y [m], theta [deg])
  midToFootTranss:
    Left:
      translation: [ 0, 0.11, 0 ] # [m]
    Right:
      translation: [ 0, -0.11, 0 ] # [m]
  footTaskGain:
    stiffness: 1000.0
  zmpHorizon: 2.0 # [sec]
  zmpOffset: [ 0, -0.02, 0 ] # (positive for x-forward, y-outside, z-upward) [m]
  defaultSwingTrajType: IndHorizontalVertical
  overwriteLandingPose: false
  stopSwingTrajForTouchDownFoot: true
  keepPoseForTouchDownFoot: false
  enableWrenchDistForTouchDownFoot: true
  enableArmSwing: false
  fricCoeff: 0.5
  touchDownRemainingDuration: 0.2 # [sec]
  touchDownPosError: 0.02 # [m]
  touchDownForceZ: 100 # [N]
  impedanceGains:
    SingleSupport:
      damper:
        linear: [ 300, 300, 300 ]
        angular: [ 150, 150, 150 ]
      spring:
        linear: [ 2250, 2250, 450 ]
        angular: [ 0, 0, 2000 ]
      wrench:
        linear: [ 0, 0, 0 ]
        angular: [ 1, 1, 0 ]
    DoubleSupport:
      damper:
        linear: [ 300, 300, 1.5e4 ]
        angular: [ 150, 150, 100 ]
      spring:
        linear: [ 2250, 2250, 0 ]
        angular: [ 0, 0, 2000 ]
      wrench:
        linear: [ 0, 0, 1 ]
        angular: [ 1, 1, 0 ]
    Swing:
      damper:
        linear: [ 300, 300, 300 ]
        angular: [ 40, 40, 40 ]
      spring:
        linear: [ 2250, 2250, 2250 ]
        angular: [ 400, 400, 400 ]
      wrench:
        linear: [ 0, 0, 0 ]
        angular: [ 0, 0, 0 ]
  VelMode:
    footstepQueueSize: 3
    enableOnlineFootstepUpdate: true
  SwingTraj:
    CubicSplineSimple:
      withdrawDurationRatio: 0.25
      withdrawOffset: [ 0, 0, 0.015 ] # [m]
      approachDurationRatio: 0.25
      approachOffset: [ 0, 0, 0.015 ] # [m]
      swingOffset: [ 0, 0, 0.05 ] # [m]
    IndHorizontalVertical:
      withdrawDurationRatio: 0.25
      approachDurationRatio: 0.25
      verticalTopDurationRatio: 0.5
      verticalTopOffset: [ 0, 0, 0.05 ] # [m]
      tiltAngleWithdraw: 20 # [deg]
      tiltAngleApproach: 10 # [deg]
      tiltAngleWithdrawDurationRatio: 0.25
      tiltAngleApproachDurationRatio: 0.25
      tiltCenterWithdrawDurationRatio: 0.25
      tiltCenterApproachDurationRatio: 0.25
      tiltDistThre: 0.2 # [m]
      tiltForwardAngleThre: 10 # [deg]
    VariableTaskGain:
      withdrawDurationRatio: 0.25
      approachDurationRatio: 0.25
      verticalTopDurationRatio: 0.5
      verticalTopOffset: [ 0, 0, 0.05 ] # [m]
    LandingSearch:
      withdrawDurationRatio: 0.2
      withdrawOffset: [ 0, 0, 0.04 ] # [m]
      preApproachDurationRatio: 0.25
      approachDurationRatio: 0.2
      approachOffset: [ 0, 0, 0.04 ] # [m]

CentroidalManager:
  name: CentroidalManager
  useActualStateForMpc: false
  enableZmpFeedback: true
  enableComZFeedback: true
  dcmGainP: 2.0 # It must be greater than 1 to be stable
  zmpVelGain: 0.02
  comZGainP: 20000.0
  comZGainD: 500.0
  refComZ: 0.94 # [m]
  useTargetPoseForControlRobotAnchorFrame: true
  useActualComForWrenchDist: false
  actualComOffset: [ 0.0, 0.0, 0.0 ]
  wrenchDistConfig:
    wrenchWeight:
      linear: [ 1.0, 1.0, 1.0 ]
      angular: [ 1.0, 1.0, 1.0 ]
    regularWeight: 1e-8
    ridgeForceMinMax: [ 3, 1000 ] # [N]
  dcmEstimator:
    enableDcmEstimator: false
    dcmCorrectionMode: Bias # "Bias", "Filter", or "None"
    biasDriftPerSecondStd: 0.002
    dcmMeasureErrorStd: 0.01
    zmpMeasureErrorStd: 0.005
    biasLimit: [ 0.03, 0.03 ]
    initDcmUncertainty: [ 0.01, 0.01 ]
    initBiasUncertainty: [ 0.01, 0.01 ]

  # PreviewControlZmp
  method: PreviewControlZmp
  horizonDuration: 2.0 # [sec]
  horizonDt: 0.005 # [sec]
  reinitForRefComZ: true

ObserverPipelines:
  name: MainObserverPipeline
  gui: true
  observers:
    - type: Encoder
    - type: Attitude
    - type: KinematicInertial
      config:
        anchorFrame:
          maxAnchorFrameDiscontinuity: 0.05 # [m]

# OverwriteConfigKeys: [NoSensors]

OverwriteConfigList:
  NoSensors:
    FootManager:
      impedanceGains:
        SingleSupport:
          damper:
            linear: [ 300, 300, 300 ]
            angular: [ 40, 40, 40 ]
          spring:
            linear: [ 2250, 2250, 2250 ]
            angular: [ 400, 400, 400 ]
          wrench:
            linear: [ 0, 0, 0 ]
            angular: [ 0, 0, 0 ]
        DoubleSupport:
          damper:
            linear: [ 300, 300, 300 ]
            angular: [ 40, 40, 40 ]
          spring:
            linear: [ 2250, 2250, 2250 ]
            angular: [ 400, 400, 400 ]
          wrench:
            linear: [ 0, 0, 0 ]
            angular: [ 0, 0, 0 ]
        Swing:
          damper:
            linear: [ 300, 300, 300 ]
            angular: [ 40, 40, 40 ]
          spring:
            linear: [ 2250, 2250, 2250 ]
            angular: [ 400, 400, 400 ]
          wrench:
            linear: [ 0, 0, 0 ]
            angular: [ 0, 0, 0 ]

    CentroidalManager:
      useActualStateForMpc: false
      enableZmpFeedback: false
      useActualComForWrenchDist: false

# Implement some additional text states
states:
  Initial:
    base: BWC::Initial
    configs:
      autoStartTime: 2.0

  Walk:
    base: BWC::GuiWalk

  GoToBox0:
    base: GoToBoxPickupPose
    pickupPoseWorld: [ 1.2, 0.3, 0.0 ]
    autoStart: true

  RaiseHands:
    base: MoveHands
    leftHandTargetPositionRobot: [ 0.1, 0.3, -0.2 ]
    rightHandTargetPositionRobot: [ 0.1, -0.3, -0.2 ]

  GoToBox0AndRaiseHands:
    base: Parallel
    states: [ RaiseHands, GoToBox0 ]
    delays:
      RaiseHands: 1.0

  GoToBox0Step0:
    base: GoToBoxPickupPose
    pickupPoseWorld: [ 1.25, 0.0, 0.0 ]

  GoToBox0Step1:
    base: GoToBoxPickupPose
    pickupPoseWorld: [ 1.25, 0.3, 0.0 ]

  GoToBox0WithSteps:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToBox0Step0, OK, GoToBox0Step1, Auto ]

  PickupBox0:
    base: PickupBox
    objectName: zbox0
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    stiffness: 2
    weight: 100000
    timeout: 3.0
    completionEval: 0.05
    completionSpeed: 2.0e-3
    manualPhaseChange: false
    approachOffset: 0.05
    crouchOffset: 0.05
    leftGripperContactOffset: 0.1
    rightGripperContactOffset: 0.06
    leftRaisePositionRobot: [ 0.15, 0.3, -0.2 ]
    rightRaisePositionRobot: [ 0.15, -0.3, -0.2 ]
    leftCarryPositionRobot: [ 0.3, 0.0, -0. ] # y value is automatically set with box width
    rightCarryPositionRobot: [ 0.3, 0.0, -0. ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    leftOrientationBox: [ 0.70710678, 0., 0.70710678, 0. ]
    rightOrientationBox: [ 0.70710678, 0., 0.70710678, 0. ]

  GoToDrop0Walk:
    base: GoToBoxDropoffPose
    dropoffPoseWorld: [ 0.6, -0.5, -1.57 ]

  GoToDrop0:
    base: GoToBoxDropoffPose
    dropoffPoseWorld: [ 0.6, -0.5, -1.57 ]
    stiffness: 2
    weight: 4000
    objectName: zbox0
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    leftPositionRobot: [ 0.3, 0.0, -0.1 ] # y value is automatically set with box width
    rightPositionRobot: [ 0.3, 0.0, -0.1 ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]

  GoToDrop0Step0:
    base: GoToBoxDropoffPose
    dropoffPoseWorld: [ 1.25, 0.3, -2.0 ]
    stiffness: 2
    weight: 4000
    objectName: zbox0
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    leftPositionRobot: [ 0.3, 0.0, -0. ] # y value is automatically set with box width
    rightPositionRobot: [ 0.3, 0.0, -0. ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    autoStart: true

  GoToDrop0Step1:
    base: GoToBoxDropoffPose
    dropoffPoseWorld: [ 0.6, -0.5, -1.57 ]
    stiffness: 2
    weight: 4000
    objectName: zbox0
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    leftPositionRobot: [ 0.3, 0.0, -0. ] # y value is automatically set with box width
    rightPositionRobot: [ 0.3, 0.0, -0. ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    autoStart: true

  GoToDrop0WithSteps:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToDrop0Step0, OK, GoToDrop0Step1, Auto]

  DropoffBox0:
    base: DropoffBox
    objectName: zbox0
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    stiffness: 2
    weight: 100000
    timeout: 3.0
    completionEval: 0.05
    completionSpeed: 2.0e-3
    manualPhaseChange: false
    approachOffset: 0.05
    leftGripperContactOffset: 0.1
    rightGripperContactOffset: 0.06
    leftRaisePositionRobot:  [ 0., 0.3, -0.1 ]
    rightRaisePositionRobot: [ 0., -0.3, -0.1 ]
    leftDropPositionRobot: [ 0.4, 0.0, -0.2 ] # y value is automatically set with box width
    rightDropPositionRobot: [ 0.4, 0.0, -0.2 ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    leftOrientationBox: [ 0.70710678, 0., 0.70710678, 0. ]
    rightOrientationBox: [ 0.70710678, 0., 0.70710678, 0. ]

  GoToBox1:
    base: GoToBoxPickupPose
    pickupPoseWorld: [ 1.24, -0.3, 0.0 ]

  GoToBox1AndRaiseHands:
    base: Parallel
    states: [ RaiseHands, GoToBox1 ]

  GoToBackOfShelf:
    base: GoToBoxPickupPose
    pickupPoseWorld: [ 0.5, 2.0, 0.0 ]

  Run:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToBox0AndRaiseHands, OK, PickupBox0, Auto ]
      - [ PickupBox0, OK, GoToDrop0WithSteps, Auto ]
      - [ GoToDrop0WithSteps, OK, DropoffBox0, Auto ]
      - [ DropoffBox0, OK, GoToBox1AndRaiseHands, Auto ]

  RunWithoutBox:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToBox0, OK, GoToDrop0Walk, Auto ]
      - [ GoToDrop0Walk, OK, GoToBox1, Auto ]

  Main:
    base: Parallel
    states: [ Walk, Run ]

transitions:
  - [ Initial, OK, Main, Auto ]

# Initial state
init: Initial

robots:
  desk:
    module: env/table
    init_pos:
      translation: [ 2.0, 0.0, 0.0 ]
      rotation: [ 0.0, 0.0, 1.57 ]
  zbox0:
    module: object/box # object/box_no_lid
    init_pos:
      translation: [ 1.6, 0.3, 0.775 ]
      # rotation: [0.0, 1.57, 0.0]
  zbox1:
    module: object/box # object/box_no_lid
    init_pos:
      translation: [ 1.6, -0.3, 0.775 ]
      # rotation: [0.0, 1.57, 0.0]
  shelf0:
    module: env/table
    init_pos:
      translation: [ 0.6, 1.0, 0.0 ]
  shelf1:
    module: env/table
    init_pos:
      translation: [ 0.6, -1.35, 0.0 ]

  ground:
    module: env/ground

  rhps1:
    PostureTask:
      jointWeights:
        CHEST_P: 50
      # For arm swing
      jointGains:
        - jointName: R_SHOULDER_P
          stiffness: 400
        - jointName: L_SHOULDER_P
          stiffness: 400


    CoMTask:
      activeJoints:
        [
          "Root",
          "L_CROTCH_Y",
          "L_CROTCH_R",
          "L_CROTCH_P",
          "L_KNEE_P",
          "L_ANKLE_R",
          "L_ANKLE_P",
          "R_CROTCH_Y",
          "R_CROTCH_R",
          "R_CROTCH_P",
          "R_KNEE_P",
          "R_ANKLE_R",
          "R_ANKLE_P",
        ]

    BaseOrientationTask:
      frame: CHEST_P_LINK

  jvrc1:
    CoMTask:
      activeJoints:
        [
          "Root",
          "R_HIP_Y",
          "R_HIP_R",
          "R_HIP_P",
          "R_KNEE",
          "R_ANKLE_P",
          "R_ANKLE_R",
          "L_HIP_Y",
          "L_HIP_R",
          "L_HIP_P",
          "L_KNEE",
          "L_ANKLE_P",
          "L_ANKLE_R",
        ]

    BaseOrientationTask:
      frame: WAIST_R_S
