---
# If true, the FSM transitions are managed by an external tool
Managed: false
# If true and the FSM is self-managed, transitions should be triggered
StepByStep: true
# Change idle behaviour, if true the state is kept until transition,
# otherwise the FSM holds the last state until transition
IdleKeepState: false
# Where to look for state libraries
StatesLibraries:
  - "@BWC_STATES_LIBRARIES@"
  - "@MC_STATES_DEFAULT_INSTALL_PREFIX@"
  - "@MC_STATES_RUNTIME_INSTALL_PREFIX@"
# Where to look for state files
StatesFiles:
  - "@BWC_STATES_FILES@"
  - "@MC_STATES_DEFAULT_INSTALL_PREFIX@/data"
  - "@MC_STATES_RUNTIME_INSTALL_PREFIX@/data"
# If true, state factory will be more verbose
VerboseStateFactory: false
# General constraints, always on
constraints:
  - type: contact
  - type: kinematics
    damper: [ 0.1, 0.01, 0.5 ]
  - type: compoundJoint
# Collision constraint
collisions:
  - type: collision
    useMinimal: true
  - type: collision
    r1: rhps1
    r2: desk
    useMinimal: true
#    collisions:
#    - body1: L_WRIST_Y_LINK
#      body2: table
#      iDist: 0.1
#      sDist: 0.05
#      damping: 0.0
#    - body1: R_WRIST_Y_LINK
#      body2: table
#      iDist: 0.1
#      sDist: 0.05
#      damping: 0.0

PostureTask:
  stiffness: 10

CoMTask:
  type: com
  stiffness: [ 1000.0, 1000.0, 1000.0 ]
  weight: 1000.0

BaseOrientationTask:
  type: orientation
  stiffness: 300.0
  weight: 500.0

FootTaskList:
  - type: firstOrderImpedance
    foot: Left
    frame: LeftFootCenter
    cutoffPeriod: 0.01
    weight: 1000.0
  - type: firstOrderImpedance
    foot: Right
    frame: RightFootCenter
    cutoffPeriod: 0.01
    weight: 1000.0

FootManager:
  name: FootManager
  footstepDuration: 1.1 # [sec]
  doubleSupportRatio: 0.15 # []
  deltaTransLimit: [ 0.1, 0.08, 7.5 ] # (x [m], y [m], theta [deg])
  midToFootTranss:
    Left:
      translation: [ 0, 0.11, 0 ] # [m]
    Right:
      translation: [ 0, -0.11, 0 ] # [m]
  footTaskGain:
    stiffness: 1000.0
  zmpHorizon: 2.0 # [sec]
  zmpOffset: [ 0, -0.02, 0 ] # (positive for x-forward, y-outside, z-upward) [m]
  defaultSwingTrajType: IndHorizontalVertical
  overwriteLandingPose: false
  stopSwingTrajForTouchDownFoot: true
  keepPoseForTouchDownFoot: false
  enableWrenchDistForTouchDownFoot: true
  enableArmSwing: false
  fricCoeff: 0.5
  touchDownRemainingDuration: 0.2 # [sec]
  touchDownPosError: 0.02 # [m]
  touchDownForceZ: 100 # [N]
  impedanceGains:
    SingleSupport:
      damper:
        linear: [ 300, 300, 300 ]
        angular: [ 150, 150, 150 ]
      spring:
        linear: [ 2250, 2250, 450 ]
        angular: [ 0, 0, 2000 ]
      wrench:
        linear: [ 0, 0, 0 ]
        angular: [ 1, 1, 0 ]
    DoubleSupport:
      damper:
        linear: [ 300, 300, 1.5e4 ]
        angular: [ 150, 150, 100 ]
      spring:
        linear: [ 2250, 2250, 0 ]
        angular: [ 0, 0, 2000 ]
      wrench:
        linear: [ 0, 0, 1 ]
        angular: [ 1, 1, 0 ]
    Swing:
      damper:
        linear: [ 300, 300, 300 ]
        angular: [ 40, 40, 40 ]
      spring:
        linear: [ 2250, 2250, 2250 ]
        angular: [ 400, 400, 400 ]
      wrench:
        linear: [ 0, 0, 0 ]
        angular: [ 0, 0, 0 ]
  VelMode:
    footstepQueueSize: 3
    enableOnlineFootstepUpdate: true
  SwingTraj:
    CubicSplineSimple:
      withdrawDurationRatio: 0.25
      withdrawOffset: [ 0, 0, 0.015 ] # [m]
      approachDurationRatio: 0.25
      approachOffset: [ 0, 0, 0.015 ] # [m]
      swingOffset: [ 0, 0, 0.05 ] # [m]
    IndHorizontalVertical:
      withdrawDurationRatio: 0.25
      approachDurationRatio: 0.25
      verticalTopDurationRatio: 0.5
      verticalTopOffset: [ 0, 0, 0.05 ] # [m]
      tiltAngleWithdraw: 20 # [deg]
      tiltAngleApproach: 10 # [deg]
      tiltAngleWithdrawDurationRatio: 0.25
      tiltAngleApproachDurationRatio: 0.25
      tiltCenterWithdrawDurationRatio: 0.25
      tiltCenterApproachDurationRatio: 0.25
      tiltDistThre: 0.2 # [m]
      tiltForwardAngleThre: 10 # [deg]
    VariableTaskGain:
      withdrawDurationRatio: 0.25
      approachDurationRatio: 0.25
      verticalTopDurationRatio: 0.5
      verticalTopOffset: [ 0, 0, 0.05 ] # [m]
    LandingSearch:
      withdrawDurationRatio: 0.2
      withdrawOffset: [ 0, 0, 0.04 ] # [m]
      preApproachDurationRatio: 0.25
      approachDurationRatio: 0.2
      approachOffset: [ 0, 0, 0.04 ] # [m]

CentroidalManager:
  name: CentroidalManager
  useActualStateForMpc: false
  enableZmpFeedback: true
  enableComZFeedback: true
  dcmGainP: 3.0 # It must be greater than 1 to be stable
  zmpVelGain: 0.02
  comZGainP: 9000.0
  comZGainD: 500.0
  refComZ: 0.94 # [m]
  useTargetPoseForControlRobotAnchorFrame: true
  useActualComForWrenchDist: false
  actualComOffset: [ 0.0, 0.0, 0.0 ]
  wrenchDistConfig:
    wrenchWeight:
      linear: [ 1.0, 1.0, 1.0 ]
      angular: [ 1.0, 1.0, 1.0 ]
    regularWeight: 1e-8
    ridgeForceMinMax: [ 3, 1000 ] # [N]
  dcmEstimator:
    enableDcmEstimator: false
    dcmCorrectionMode: Bias # "Bias", "Filter", or "None"
    biasDriftPerSecondStd: 0.002
    dcmMeasureErrorStd: 0.01
    zmpMeasureErrorStd: 0.005
    biasLimit: [ 0.03, 0.03 ]
    initDcmUncertainty: [ 0.01, 0.01 ]
    initBiasUncertainty: [ 0.01, 0.01 ]

  # PreviewControlZmp
  method: PreviewControlZmp
  horizonDuration: 2.0 # [sec]
  horizonDt: 0.005 # [sec]
  reinitForRefComZ: true

ObserverPipelines:
  name: MainObserverPipeline
  gui: true
  observers:
    - type: Encoder
    - type: Attitude
    - type: KinematicInertial
      config:
        anchorFrame:
          maxAnchorFrameDiscontinuity: 0.05 # [m]

# OverwriteConfigKeys: [NoSensors]

OverwriteConfigList:
  NoSensors:
    FootManager:
      impedanceGains:
        SingleSupport:
          damper:
            linear: [ 300, 300, 300 ]
            angular: [ 40, 40, 40 ]
          spring:
            linear: [ 2250, 2250, 2250 ]
            angular: [ 400, 400, 400 ]
          wrench:
            linear: [ 0, 0, 0 ]
            angular: [ 0, 0, 0 ]
        DoubleSupport:
          damper:
            linear: [ 300, 300, 300 ]
            angular: [ 40, 40, 40 ]
          spring:
            linear: [ 2250, 2250, 2250 ]
            angular: [ 400, 400, 400 ]
          wrench:
            linear: [ 0, 0, 0 ]
            angular: [ 0, 0, 0 ]
        Swing:
          damper:
            linear: [ 300, 300, 300 ]
            angular: [ 40, 40, 40 ]
          spring:
            linear: [ 2250, 2250, 2250 ]
            angular: [ 400, 400, 400 ]
          wrench:
            linear: [ 0, 0, 0 ]
            angular: [ 0, 0, 0 ]

    CentroidalManager:
      useActualStateForMpc: false
      enableZmpFeedback: false
      useActualComForWrenchDist: false

# Implement some additional text states
states:

  Initial:
    base: BWC::Initial
    configs:
      autoStartTime: 2.0

  Walk:
    base: BWC::GuiWalk

  RaiseHands:
    base: MoveHands
    leftHandTargetPositionRobot: [ 0.1, 0.3, -0. ]
    rightHandTargetPositionRobot: [ 0.1, -0.3, -0. ]
    weight: 5000
    stiffness: 5

  RaiseHandsBack:
    base: MoveHands
    leftHandTargetPositionRobot: [ -0.2, 0.3, -0. ]
    rightHandTargetPositionRobot: [ -0.2, -0.3, -0. ]
    weight: 5000
    stiffness: 5

  ShoulderPose:
    base: ShoulderOrientation
    leftShoulderAngle: 0.5
    rightShoulderAngle: -0.5
    weight: 1000
    stiffness: 2

  GoToConfigured:
    base: GoTo
    configs:
      maxPlanningDuration: 1.0 # [sec]
      initialHeuristicsWeight: 10.0
      footstepPlanner:
        theta_divide_num: 64
        xy_divide_step: 0.01 # [m]
        cost_scale: 1.0e3
        theta_scale: 0 # [m/rad]
        step_cost: 1.0
        dijkstra_path_heuristic_expand_scale: 5.0
        nominal_foot_separation: 0.2 # [m]
        r2l_action_cont_list: # [m], [rad]
          [
            [ 0.175, 0, 0 ],
            [ -0.015, 0, 0 ],
            [ 0, 0.025, 0 ],
            [ 0, -0.025, 0 ],
            [ 0, 0, 0.1 ],
            [ 0, 0, -0.1 ],
          ]
        r2l_reachable_min: [ -0.1, 0.0, -0.1745 ] # [m], [rad]
        r2l_reachable_max: [ 0.1, 0.1, 0.1745 ]  # [m], [rad]
        rect_obstacle_list:
          - [ 1.85, 0.0, 0.525, 0.8 ]
          - [ 0.6, 1.15, 0.99, 0.625 ]
          - [ 0.6, -1.35, 0.99, 0.625 ]

  GoToBox00: # start at [ 0.0, 0.0, 0.0 ]
    base: GoToConfigured
    destinationPoseWorld: [ 1.0, 0.3, 0.0 ]
  GoToBox01:
    base: GoToConfigured
    destinationPoseWorld: [ 1.25, 0.3, 0.0 ]

  GoToBox0:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToBox00, OK, GoToBox01, Auto ]

  GoToBox0WithHands:
    base: Parallel
    states: [ RaiseHands, ShoulderPose, GoToBox0 ]
    delays:
      RaiseHands: 1.0
      ShoulderPose: 1.0

  PickupBox0:
    base: PickupBox
    objectName: zbox0
    objectSurfaceLeftGripper: Back
    objectSurfaceRightGripper: Front
    stiffness: 10
    weight: 7000
    timeout: 3.0
    completionEval: 0.05
    completionSpeed: 2.0e-4
    leftApproachOffsetRobot: [ 0.0, 0.1, -0.01 ]
    rightApproachOffsetRobot: [ 0.0, -0.1, -0.01 ]
    crouchOffset: 0.06
    leftGripperContactOffset: -0.06
    rightGripperContactOffset: -0.1
    leftRaisePositionRobot: [ 0.15, 0.3, -0.2 ]
    rightRaisePositionRobot: [ 0.15, -0.3, -0.2 ]
    leftCarryPositionRobot: [ 0.3, 0.0, -0. ] # y value is automatically set with box width
    rightCarryPositionRobot: [ 0.3, 0.0, -0. ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    leftOrientationBox: [ -0.5, -0.5,  0.5,  0.5 ] # [ 0.70710678, 0., 0.70710678, 0. ]
    rightOrientationBox: [ 0.5, -0.5, -0.5,  0.5 ] # [ 0.70710678, 0., 0.70710678, 0. ]

  PickupBox0WithShoulders:
    base: Parallel
    states: [ ShoulderPose, PickupBox0 ]

  HoldBox0:
    base: HoldBox
    stiffness: 2
    weight: 1000
    objectName: zbox0
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    leftPositionRobot: [ 0.3, 0.0, -0. ] # y value is automatically set with box width
    rightPositionRobot: [ 0.3, 0.0, -0. ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]

  GoToDrop00: # start at [ 1.25, 0.3, 0.0 ]
    base: GoToConfigured
    destinationPoseWorld: [ 1.0, 0.3, 0.0 ]
  GoToDrop01:
    base: GoToConfigured
    destinationPoseWorld: [ 1.0, 0.3, -1.57 ]
    configs:
      footstepPlanner:
        nominal_foot_separation: 0.3
  GoToDrop02:
    base: GoToConfigured
    destinationPoseWorld: [ 0.6, -0.55, -1.57 ]

  GoToDrop0:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToDrop00, OK, GoToDrop01, Auto ]
      - [ GoToDrop01, OK, GoToDrop02, Auto ]

  GoToDrop0WithBox0:
    base: Parallel
    states: [ ShoulderPose, HoldBox0, GoToDrop0 ]

  DropoffBox0:
    base: DropoffBox
    objectName: zbox0
    objectSurfaceLeftGripper: Back
    objectSurfaceRightGripper: Front
    stiffness: 5
    weight: 7000
    timeout: 3.0
    completionEval: 0.05
    completionSpeed: 2.0e-4
    leftApproachOffsetRobot: [ 0.0, 0.1, 0.035 ]
    rightApproachOffsetRobot: [ 0.0, -0.1, 0.035 ]
    leftGripperContactOffset: -0.06
    rightGripperContactOffset: -0.1
    leftDropPositionRobot: [ 0.3, 0.0, -0.1 ] # y value is automatically set with box width
    rightDropPositionRobot: [ 0.3, 0.0, -0.1 ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    leftOrientationBox: [ -0.5, -0.5,  0.5,  0.5 ] # [ 0.70710678, 0., 0.70710678, 0. ]
    rightOrientationBox: [ 0.5, -0.5, -0.5,  0.5 ] # [ 0.70710678, 0., 0.70710678, 0. ]

  DropoffBox0WithShoulders:
    base: Parallel
    states: [ ShoulderPose, DropoffBox0 ]

  GoToBox10: # start at [ 0.6, -0.55, -1.57 ]
    base: GoToConfigured
    destinationPoseWorld: [ 0.6, -0.3, -1.57 ]
  GoToBox11:
    base: GoToConfigured
    destinationPoseWorld: [ 0.6, -0.3, 0.0 ]
    configs:
      footstepPlanner:
        nominal_foot_separation: 0.3
  GoToBox12:
    base: GoToConfigured
    destinationPoseWorld: [ 1.25, -0.3, 0.0 ]

  GoToBox1:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToBox10, OK, GoToBox11, Auto ]
      - [ GoToBox11, OK, GoToBox12, Auto ]

  GoToBox1WithHands:
    base: Parallel
    states: [ RaiseHands, ShoulderPose, GoToBox1 ]

  PickupBox1:
    base: PickupBox
    objectName: zbox1
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    stiffness: 10
    weight: 10000
    timeout: 3.0
    completionEval: 0.05
    completionSpeed: 2.0e-3
    approachOffset: 0.1
    crouchOffset: 0.05
    leftGripperContactOffset: 0.1
    rightGripperContactOffset: 0.06
    leftRaisePositionRobot: [ 0.15, 0.3, -0. ]
    rightRaisePositionRobot: [ 0.15, -0.3, -0. ]
    leftCarryPositionRobot: [ 0.3, 0.0, -0. ] # y value is automatically set with box width
    rightCarryPositionRobot: [ 0.3, 0.0, -0. ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    leftOrientationBox: [ 0.70710678, 0., 0.70710678, 0. ]
    rightOrientationBox: [ 0.70710678, 0., 0.70710678, 0. ]

  PickupBox1WithShoulders:
    base: Parallel
    states: [ ShoulderPose, PickupBox1 ]

  HoldBox1:
    base: HoldBox
    stiffness: 2
    weight: 1000
    objectName: zbox1
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    leftPositionRobot: [ 0.3, 0.0, -0. ] # y value is automatically set with box width
    rightPositionRobot: [ 0.3, 0.0, -0. ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    configs:
      maxPlanningDuration: 1.0 # [sec]
      initialHeuristicsWeight: 10.0

  GoToDrop10: # start at [ 1.25, -0.3, 0.0 ]
    base: GoToConfigured
    destinationPoseWorld: [ 1.0, -0.3, 0.0 ]
  GoToDrop11:
    base: GoToConfigured
    destinationPoseWorld: [ 1.25, -0.3, 3.14 ]
    configs:
      footstepPlanner:
        nominal_foot_separation: 0.3
  GoToDrop12:
    base: GoToConfigured
    destinationPoseWorld: [ -0.6, 2.0, 1.57 ]
    configs:
      maxPlanningDuration: 100.0
  GoToDrop13:
    base: GoToConfigured
    destinationPoseWorld: [ -0.6, 2.0, 0.0 ]
    configs:
      footstepPlanner:
        nominal_foot_separation: 0.3
  GoToDrop14:
    base: GoToConfigured
    destinationPoseWorld: [ 0.6, 2.0, 0.0 ]
  GoToDrop15:
    base: GoToConfigured
    destinationPoseWorld: [ 0.6, 1.80, -1.57 ]
    configs:
      footstepPlanner:
        nominal_foot_separation: 0.3

  GoToDrop1:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToDrop10, OK, GoToDrop11, Auto ]
      - [ GoToDrop11, OK, GoToDrop12, Auto ]
      - [ GoToDrop12, OK, GoToDrop13, Auto ]
      - [ GoToDrop13, OK, GoToDrop14, Auto ]
      - [ GoToDrop14, OK, GoToDrop15, Auto ]

  GoToDrop1WithBox1:
    base: Parallel
    states: [ HoldBox1, ShoulderPose, GoToDrop1 ]

  DropoffBox1:
    base: DropoffBox
    objectName: zbox1
    objectSurfaceLeftGripper: Right
    objectSurfaceRightGripper: Left
    stiffness: 2
    weight: 1000
    timeout: 3.0
    completionEval: 0.1
    completionSpeed: 2.0e-3
    approachOffset: 0.1
    leftGripperContactOffset: 0.1
    rightGripperContactOffset: 0.06
    leftRaisePositionRobot: [ 0., 0.3, -0.1 ]
    rightRaisePositionRobot: [ 0., -0.3, -0.1 ]
    leftDropPositionRobot: [ 0.3, 0.0, -0.2 ] # y value is automatically set with box width
    rightDropPositionRobot: [ 0.3, 0.0, -0.2 ]
    leftOrientationRobot: [ 0.5, 0.5, 0.5, -0.5 ]
    rightOrientationRobot: [ 0.5, -0.5, 0.5, 0.5 ]
    leftOrientationBox: [ 0.70710678, 0., 0.70710678, 0. ]
    rightOrientationBox: [ 0.70710678, 0., 0.70710678, 0. ]

  DropoffBox1WithShoulders:
    base: Parallel
    states: [ ShoulderPose, DropoffBox1 ]

  Run:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ GoToBox0WithHands, OK, PickupBox0WithShoulders, Auto ]
      - [ PickupBox0WithShoulders, OK, GoToDrop0WithBox0, Auto ]
      - [ GoToDrop0WithBox0, OK, DropoffBox0WithShoulders, Auto ]
      - [ DropoffBox0WithShoulders, OK, GoToBox1WithHands, Auto ]
      - [ GoToBox1WithHands, OK, PickupBox1WithShoulders, Auto ]
      - [ PickupBox1WithShoulders, OK, GoToDrop1WithBox1, Auto ]
      - [ GoToDrop1WithBox1, OK, DropoffBox1WithShoulders, Auto ]

  PickupAndDropLoop:
    base: Meta
    Managed: false
    StepByStep: true
    ResetPostures: false
    transitions:
      - [ RaiseHandsBack, OK, PickupBox0WithShoulders, Auto ]
      - [ PickupBox0WithShoulders, OK, DropoffBox0WithShoulders, Auto ]
      - [ DropoffBox0WithShoulders, OK, PickupBox0WithShoulders, Auto ]

  Main:
    base: Parallel
    states: [ Walk, PickupAndDropLoop ]

transitions:
  - [ Initial, OK, Main, Auto ]

# Initial state
init: Initial

robots:
  desk:
    module: env/table
    init_pos:
      translation: [ 2.0, 0.0, 0.0 ]
      rotation: [ 0.0, 0.0, 1.57 ]
  zbox0:
    module: DemoController::BoxNoLid # object/box_no_lid
    init_pos:
      translation: [ 1.6, 0.3, 0.71 ]
      # rotation: [0.0, 1.57, 0.0]
  zbox1:
    module: DemoController::BoxNoLid # object/box_no_lid
    init_pos:
      translation: [ 1.6, -0.3, 0.71 ]
      # rotation: [0.0, 1.57, 0.0]
  shelf0:
    module: DemoController::Shelf
    init_pos:
      translation: [ 0.6, 1.0, 0.0 ]
  shelf1:
    module: DemoController::Shelf
    init_pos:
      translation: [ 0.6, -1.35, 0.0 ]

  ground:
    module: env/ground

  rhps1:
    init_pos: # in front of box0
      translation: [ 1.25, 0.3, 0.84 ]
    PostureTask:
      jointWeights:
        CHEST_P: 50
      # For arm swing
      jointGains:
        - jointName: R_SHOULDER_P
          stiffness: 400
        - jointName: L_SHOULDER_P
          stiffness: 400


    CoMTask:
      activeJoints:
        [
          "Root",
          "L_CROTCH_Y",
          "L_CROTCH_R",
          "L_CROTCH_P",
          "L_KNEE_P",
          "L_ANKLE_R",
          "L_ANKLE_P",
          "R_CROTCH_Y",
          "R_CROTCH_R",
          "R_CROTCH_P",
          "R_KNEE_P",
          "R_ANKLE_R",
          "R_ANKLE_P",
        ]

    BaseOrientationTask:
      frame: CHEST_P_LINK

  jvrc1:
    CoMTask:
      activeJoints:
        [
          "Root",
          "R_HIP_Y",
          "R_HIP_R",
          "R_HIP_P",
          "R_KNEE",
          "R_ANKLE_P",
          "R_ANKLE_R",
          "L_HIP_Y",
          "L_HIP_R",
          "L_HIP_P",
          "L_KNEE",
          "L_ANKLE_P",
          "L_ANKLE_R",
        ]

    BaseOrientationTask:
      frame: WAIST_R_S
